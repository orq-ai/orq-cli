name: '[Pre-release] Release'

# orquesta-web commits the regenerated staging schema (packages/orq-rc/openapi.yaml)
# and bumps app_version in packages/orq-rc/.bartolo.json, then pushes to main.
# That push triggers this workflow, which builds the rc CLI module and publishes
# the same @orq-ai/cli package under the npm "rc" dist-tag as a prerelease.
on:
  push:
    branches: [feat/release-pipeline-prod-rc] #[main]
    # paths:
    #   - packages/orq-rc/openapi.yaml
    #   - packages/orq-rc/.bartolo.json

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    name: Runner
    with:
      module_dir: packages/orq-rc
      npm_dist_tag: rc
