name: '[TEST] RC regenerate (stops after generate)'

# TEMPORARY test workflow — delete before merging.
# Exercises the pre-release (rc) release path in real GitHub Actions, but only
# through the "Regenerate CLI from schema" step. No commit-back, tag, release,
# build, or npm publish. Triggers on push to the feature branch since the real
# release workflows only fire on push to main and workflow_dispatch requires the
# default branch.
on:
  push:
    branches:
      - feat/release-pipeline-prod-rc

permissions:
  contents: write # the test commits regenerated code back to this branch

env:
  MODULE_DIR: packages/orq-rc # rc / pre-release path

jobs:
  test:
    # macos-latest so `codesign` is available to ad-hoc sign the darwin binaries,
    # matching the real release runner. Go cross-compiles linux/windows fine here.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git
        run: |
          git config --global user.name "Orq GitHub Actions"
          git config --global user.email "admin@orq.ai"

      - name: Install bartolo (pinned to go.mod)
        run: |
          workdir="${MODULE_DIR:-.}"
          pin="$(cd "$workdir" && go list -m -f '{{.Version}}' github.com/orq-ai/bartolo)"
          echo "Installing bartolo $pin"
          go install "github.com/orq-ai/bartolo@${pin}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        run: |
          workdir="${MODULE_DIR:-.}"
          version="$(jq -r '.app_version' "$workdir/.bartolo.json")"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "error: app_version missing in $workdir/.bartolo.json" >&2
            exit 1
          fi
          tag="v$version"
          if [[ "$version" == *-rc.* ]]; then prerelease=true; else prerelease=false; fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$version tag=$tag prerelease=$prerelease"

      - name: Regenerate CLI from schema
        run: |
          workdir="${MODULE_DIR:-.}"
          spec="$(jq -r '.last_spec_path' "$workdir/.bartolo.json")"
          ( cd "$workdir" && bartolo generate "$spec" )

      - name: Sanity — what changed + rc build compiles
        run: |
          echo "=== git status after regenerate ==="
          git status --short
          echo "=== generated file count ==="
          ls "${MODULE_DIR}/cli/generated" | wc -l
          echo "=== rc module builds ==="
          ( cd "${MODULE_DIR}" && go build ./cmd/orq && echo "rc build OK" )

      - name: Commit regenerated code to this branch (TEST)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          workdir="${MODULE_DIR:-.}"
          # Stage the generated docs (README.md + examples/README.md) with the
          # generated code and its manifests. bartolo leaves an existing curated
          # README.md untouched — its fallback goes to README.generated.md, which
          # we intentionally do not commit.
          git add "$workdir/cli/generated" "$workdir/examples" "$workdir/README.md" "$workdir/go.mod" "$workdir/go.sum" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Regenerate CLI for $VERSION"
            # Push back to the branch that triggered this run (NOT main). The
            # default GITHUB_TOKEN credential pushes without re-triggering the
            # workflow, so this can't loop on its own push event.
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Build all platform binaries
        run: ./scripts/release-build.sh "${{ steps.version.outputs.version }}" "${MODULE_DIR}"

      - name: Verify stamped version
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          echo "Built from module : ${MODULE_DIR:-root}"
          echo "Expected version  : $EXPECTED"
          fail=0

          # 1) All six package.json versions (wrapper + 5 platform packages) must
          #    equal the resolved version — these are what get published to npm.
          for pj in npm/cli/package.json npm/cli-*/package.json; do
            v="$(jq -r '.version' "$pj")"
            echo "  $pj -> $v"
            [ "$v" = "$EXPECTED" ] || { echo "    MISMATCH (expected $EXPECTED)" >&2; fail=1; }
          done

          # 2) The wrapper's optionalDependencies pins must also match, or an
          #    install would resolve mismatched platform packages.
          echo "  wrapper optionalDependencies:"
          jq -r '.optionalDependencies | to_entries[] | "    \(.key) -> \(.value)"' npm/cli/package.json
          jq -e --arg v "$EXPECTED" '.optionalDependencies | to_entries | all(.value == $v)' \
            npm/cli/package.json >/dev/null || { echo "    optionalDependencies MISMATCH" >&2; fail=1; }

          # 3) The built native binary reports the same version (ldflags stamp).
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64)  bin=npm/cli-darwin-arm64/bin/orq ;;
            Darwin-x86_64) bin=npm/cli-darwin-x64/bin/orq ;;
            Linux-x86_64)  bin=npm/cli-linux-x64/bin/orq ;;
            Linux-aarch64) bin=npm/cli-linux-arm64/bin/orq ;;
            *) echo "unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          got="$("$bin" --version)"
          echo "  binary ($bin) -> $got"
          echo "$got" | grep -qF "$EXPECTED" || { echo "    binary VERSION MISMATCH" >&2; fail=1; }

          [ "$fail" -eq 0 ] || { echo "version stamp check FAILED" >&2; exit 1; }
          echo "OK: package.json + binary all report $EXPECTED"

      - name: npm publish dry-run (validates packaging, publishes nothing)
        env:
          DIST_TAG: rc # rc/pre-release path always publishes under the rc dist-tag
        run: |
          set -e
          # --dry-run packs each package and reports its contents/version without
          # uploading. No NODE_AUTH_TOKEN needed. --tag is required because these
          # are prerelease versions (npm refuses to default a prerelease to latest).
          # The real release.yml does this for the wrapper, then actually publishes;
          # the test stops at dry-run so nothing hits the npm registry.
          for pkgdir in npm/cli-*/ npm/cli/; do
            echo "=== dry-run $(basename "$pkgdir") ==="
            (cd "$pkgdir" && npm publish --access public --tag "$DIST_TAG")
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          # Mirrors release.yml. TEST-only: delete any prior release+tag for this
          # version first so re-runs don't fail on an already-existing release.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          flags=(--title "$TAG" --target "$(git rev-parse HEAD)" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          gh release create "$TAG" "${flags[@]}"

      - name: Stage raw binaries for GitHub Release
        run: |
          set -e
          mkdir -p dist
          for pkgdir in npm/cli-*/; do
            name="$(basename "$pkgdir")"
            target="${name#cli-}"
            if [ "$target" = "win32-x64" ]; then
              cp "$pkgdir/bin/orq.exe" "dist/orq-$target.exe"
            else
              cp "$pkgdir/bin/orq" "dist/orq-$target"
            fi
          done
          ls -la dist/

      - name: Upload raw binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" dist/orq-* --clobber
