name: '[TEST] RC regenerate (stops after generate)'

# TEMPORARY test workflow — delete before merging.
# Exercises the pre-release (rc) release path in real GitHub Actions, but only
# through the "Regenerate CLI from schema" step. No commit-back, tag, release,
# build, or npm publish. Triggers on push to the feature branch since the real
# release workflows only fire on push to main and workflow_dispatch requires the
# default branch.
on:
  push:
    branches:
      - feat/release-pipeline-prod-rc

permissions:
  contents: write # the test commits regenerated code back to this branch

env:
  MODULE_DIR: packages/orq-rc # rc / pre-release path

jobs:
  test:
    # macos-latest so `codesign` is available to ad-hoc sign the darwin binaries,
    # matching the real release runner. Go cross-compiles linux/windows fine here.
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git
        run: |
          git config --global user.name "Orq GitHub Actions"
          git config --global user.email "admin@orq.ai"

      - name: Install bartolo (pinned to go.mod)
        run: |
          workdir="${MODULE_DIR:-.}"
          pin="$(cd "$workdir" && go list -m -f '{{.Version}}' github.com/orq-ai/bartolo)"
          echo "Installing bartolo $pin"
          go install "github.com/orq-ai/bartolo@${pin}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        run: |
          workdir="${MODULE_DIR:-.}"
          version="$(jq -r '.app_version' "$workdir/.bartolo.json")"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "error: app_version missing in $workdir/.bartolo.json" >&2
            exit 1
          fi
          tag="v$version"
          if [[ "$version" == *-rc.* ]]; then prerelease=true; else prerelease=false; fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version=$version tag=$tag prerelease=$prerelease"

      - name: Regenerate CLI from schema
        run: |
          workdir="${MODULE_DIR:-.}"
          spec="$(jq -r '.last_spec_path' "$workdir/.bartolo.json")"
          ( cd "$workdir" && bartolo generate "$spec" )

      - name: Sanity — what changed + rc build compiles
        run: |
          echo "=== git status after regenerate ==="
          git status --short
          echo "=== generated file count ==="
          ls "${MODULE_DIR}/cli/generated" | wc -l
          echo "=== rc module builds ==="
          ( cd "${MODULE_DIR}" && go build ./cmd/orq && echo "rc build OK" )

      - name: Commit regenerated code to this branch (TEST)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          workdir="${MODULE_DIR:-.}"
          # bartolo 0.4.3 writes the generated API doc to README.generated.md and
          # leaves the curated README.md alone. Keep this defensive restore in
          # case an older generator clobbers README.md, and never stage README.*.
          git checkout -- "$workdir/README.md" 2>/dev/null || true
          # Stage only generator outputs + their dependency manifests.
          git add "$workdir/cli/generated" "$workdir/examples" "$workdir/go.mod" "$workdir/go.sum" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Regenerate CLI for $VERSION"
            # Push back to the branch that triggered this run (NOT main). The
            # default GITHUB_TOKEN credential pushes without re-triggering the
            # workflow, so this can't loop on its own push event.
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Build all platform binaries
        run: ./scripts/release-build.sh "${{ steps.version.outputs.version }}" "${MODULE_DIR}"

      - name: Verify built binary version
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          # Pick the binary for this runner's OS/arch out of the npm packages.
          case "$(uname -s)-$(uname -m)" in
            Darwin-arm64)  bin=npm/cli-darwin-arm64/bin/orq ;;
            Darwin-x86_64) bin=npm/cli-darwin-x64/bin/orq ;;
            Linux-x86_64)  bin=npm/cli-linux-x64/bin/orq ;;
            Linux-aarch64) bin=npm/cli-linux-arm64/bin/orq ;;
            *) echo "unsupported runner: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
          esac
          echo "Built from module : ${MODULE_DIR:-root}"
          echo "Expected version  : $EXPECTED"
          got="$("$bin" --version)"
          echo "Binary reports    : $got"
          # ldflags stamps -X main.version=$EXPECTED, so --version must contain it.
          echo "$got" | grep -qF "$EXPECTED" || { echo "VERSION MISMATCH" >&2; exit 1; }
          echo "OK: binary version matches"
