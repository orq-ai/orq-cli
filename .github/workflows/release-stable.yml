name: '[Stable] Release'

# orquesta-web commits the regenerated prod schema (root openapi.yaml) and bumps
# app_version in the root .bartolo.json, then pushes to main. That push is the
# trigger and the source of the published version. rc changes live under
# packages/orq-rc/ and never match these root-only paths.
on:
  push:
    branches: [main]
    paths:
      - openapi.yaml
      - .bartolo.json

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/release.yml
    name: Runner
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    with:
      module_dir: ''
      npm_dist_tag: latest
