name: Release

on:
  push:
    branches: [feat/release-pipeline-prod-rc] # [main]
    paths:
      - openapi.yaml
      - .bartolo.json
      - packages/orq-rc/openapi.yaml
      - packages/orq-rc/.bartolo.json
  workflow_dispatch:
    inputs:
      target:
        description: "Which release to run"
        required: true
        type: choice
        options:
          - stable
          - prerelease
          - both

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      stable: ${{ steps.changes.outputs.stable }}
      prerelease: ${{ steps.changes.outputs.prerelease }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect changed files
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ inputs.target }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            # Manual trigger - use input
            case "$TARGET" in
              stable)
                echo "stable=true" >> "$GITHUB_OUTPUT"
                echo "prerelease=false" >> "$GITHUB_OUTPUT"
                ;;
              prerelease)
                echo "stable=false" >> "$GITHUB_OUTPUT"
                echo "prerelease=true" >> "$GITHUB_OUTPUT"
                ;;
              both)
                echo "stable=true" >> "$GITHUB_OUTPUT"
                echo "prerelease=true" >> "$GITHUB_OUTPUT"
                ;;
            esac
          else
            # Push event - detect from changed files
            CHANGED=$(git diff --name-only HEAD~1 HEAD)

            if echo "$CHANGED" | grep -qE "^(openapi\.yaml|\.bartolo\.json)$"; then
              echo "stable=true" >> "$GITHUB_OUTPUT"
            else
              echo "stable=false" >> "$GITHUB_OUTPUT"
            fi

            if echo "$CHANGED" | grep -qE "^packages/orq-rc/(openapi\.yaml|\.bartolo\.json)$"; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  release-stable:
    needs: detect-changes
    if: needs.detect-changes.outputs.stable == 'true'
    uses: ./.github/workflows/release-pipeline.yml
    name: Stable
    permissions:
      contents: write
      id-token: write
    with:
      npm_dist_tag: latest

  release-prerelease:
    needs: detect-changes
    if: needs.detect-changes.outputs.prerelease == 'true'
    uses: ./.github/workflows/release-pipeline.yml
    name: Pre-release
    permissions:
      contents: write
      id-token: write
    with:
      module_dir: packages/orq-rc
      npm_dist_tag: rc
