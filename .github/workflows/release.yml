name: Release

# Reusable release pipeline, called by release-stable.yml (prod, root module)
# and release-pre-release.yml (rc, packages/orq-rc module). It regenerates the
# CLI from the OpenAPI schema that orquesta-web committed, syncs the generated
# code back to main, tags + publishes a GitHub release, cross-compiles every
# platform binary, and publishes @orq-ai/cli to npm under the given dist-tag.
#
# The version is read from the module's .bartolo.json app_version (bumped by
# orquesta-web); the tag is derived as v<app_version>. rc versions carry an
# -rc.N suffix and produce a prerelease.
on:
  workflow_call:
    inputs:
      module_dir:
        description: "Go module to release from ('' = repo root / prod, 'packages/orq-rc' = rc)"
        type: string
        required: false
        default: ''
      npm_dist_tag:
        description: "npm dist-tag to publish under (latest for prod, rc for pre-release)"
        type: string
        required: true

# Serialize releases per module so two pushes can't race the commit-back/tag.
concurrency:
  group: release-${{ inputs.module_dir || 'root' }}
  cancel-in-progress: false

env:
  MODULE_DIR: ${{ inputs.module_dir }}

jobs:
  release:
    # macOS runner so `codesign` is available for ad-hoc signing the two darwin
    # binaries. Go's cross toolchain builds linux/windows fine from macOS.
    runs-on: macos-latest

    permissions:
      contents: write # commit regenerated code, push tag, create release + assets

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        # persist-credentials required: the commit-back + tag push below write to
        # the repo with the GITHUB_TOKEN credential (contents: write).
        # zizmor: ignore[artipacked]
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "stable"
          # Never build release binaries from a shared cache — a poisoned module
          # or build cache would end up inside the published artifacts.
          cache: false

      - name: Set up Node.js
        # setup-node's dependency cache is opt-in and not enabled here.
        # zizmor: ignore[cache-poisoning]
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Configure git
        run: |
          # Identity for the commit-back below. bartolo (orq-ai/bartolo) is a
          # public module, so no extra auth is needed to install/build it; the
          # default checkout credential already covers the push-back + tag.
          # GITHUB_TOKEN pushes don't trigger further workflow runs, so the
          # commit-back can't re-fire the release trigger.
          git config --global user.name "Orq GitHub Actions"
          git config --global user.email "admin@orq.ai"

      - name: Install bartolo (pinned to go.mod)
        run: |
          workdir="${MODULE_DIR:-.}"
          pin="$(cd "$workdir" && go list -m -f '{{.Version}}' github.com/orq-ai/bartolo)"
          echo "Installing bartolo $pin"
          go install "github.com/orq-ai/bartolo@${pin}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve version
        id: version
        run: |
          workdir="${MODULE_DIR:-.}"
          version="$(jq -r '.app_version' "$workdir/.bartolo.json")"
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "error: app_version missing in $workdir/.bartolo.json" >&2
            exit 1
          fi
          tag="v$version"
          if [[ "$version" == *-rc.* ]]; then prerelease=true; else prerelease=false; fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (prerelease=$prerelease) from module '${MODULE_DIR:-root}'"

      - name: Regenerate CLI from schema
        run: |
          workdir="${MODULE_DIR:-.}"
          spec="$(jq -r '.last_spec_path' "$workdir/.bartolo.json")"
          ( cd "$workdir" && bartolo generate "$spec" )

      - name: Commit regenerated code to main
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          workdir="${MODULE_DIR:-.}"
          # Stage the generated docs (README.md + examples/README.md) with the
          # generated code and its manifests. bartolo leaves an existing curated
          # README.md untouched — its fallback goes to README.generated.md, which
          # we intentionally do not commit.
          git add "$workdir/cli/generated" "$workdir/examples" "$workdir/README.md" "$workdir/go.mod" "$workdir/go.sum" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Regenerate CLI for $VERSION"
            git push origin HEAD:main
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          # gh creates the tag itself (at the current HEAD, already pushed to main
          # by the commit-back step) and publishes the release — no separate
          # `git tag`/`git push` needed.
          flags=(--title "$TAG" --target "$(git rev-parse HEAD)" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          gh release create "$TAG" "${flags[@]}"

      - name: Build all platform binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/release-build.sh "$VERSION" "${MODULE_DIR}"

      - name: Dry-run publish wrapper package
        env:
          DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          # --tag is required for prerelease versions (rc), else npm refuses to
          # publish rather than default it to the latest dist-tag.
          cd npm/cli
          npm publish --access public --dry-run --tag "$DIST_TAG"

      - name: Publish platform packages to npm
        env:
          DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -e
          for pkgdir in npm/cli-*/; do
            echo "=== Publishing $(basename "$pkgdir") @ dist-tag $DIST_TAG ==="
            (cd "$pkgdir" && npm publish --access public --tag "$DIST_TAG")
          done

      - name: Publish wrapper package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          cd npm/cli
          echo "=== Publishing @orq-ai/cli @ dist-tag $DIST_TAG ==="
          npm publish --access public --tag "$DIST_TAG"

      - name: Stage raw binaries for GitHub Release
        run: |
          set -e
          mkdir -p dist
          for pkgdir in npm/cli-*/; do
            name="$(basename "$pkgdir")"
            target="${name#cli-}"
            if [ "$target" = "win32-x64" ]; then
              cp "$pkgdir/bin/orq.exe" "dist/orq-$target.exe"
            else
              cp "$pkgdir/bin/orq" "dist/orq-$target"
            fi
          done
          ls -la dist/

      - name: Upload raw binaries to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release upload "$TAG" dist/orq-* --clobber
